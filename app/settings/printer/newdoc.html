<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Invoice - MICROSOFT</title>
</head>
<body style="margin:0; font-family: Arial, sans-serif;">

  <!-- Top Blue Header -->
  <div style="background:#1976d2; color:#fff; padding:10px 20px; font-weight:bold;">
    Invoice : MICROSOFT
  </div>

  <!-- Toolbar -->
  <div style="display:flex; align-items:center; gap:10px; padding:10px 20px; border-bottom:1px solid #ddd;">
    <button style="border:none; background:#f5f5f5; padding:5px 10px; cursor:pointer;">⬅</button>
    <button style="border:none; background:#f5f5f5; padding:5px 10px; cursor:pointer;">➡</button>
    <button style="border:none; background:#f5f5f5; padding:5px 10px; cursor:pointer;">⟳</button>
    <div style="flex:1;"></div>
    <input type="text" placeholder="Search..." style="padding:5px 10px; border:1px solid #ccc; border-radius:4px;"/>
  </div>

  <!-- Table -->
  <table style="width:100%; border-collapse:collapse; font-size:14px; margin-top:10px;">
    <thead>
      <tr style="background:#f5f5f5; text-align:left;">
        <th style="padding:8px; border:1px solid #ddd;">Product ID</th>
        <th style="padding:8px; border:1px solid #ddd;">Designation</th>
        <th style="padding:8px; border:1px solid #ddd;">Qty</th>
        <th style="padding:8px; border:1px solid #ddd;">C. TVA</th>
        <th style="padding:8px; border:1px solid #ddd;">Unit Pr.VAT excl</th>
        <th style="padding:8px; border:1px solid #ddd;">Unit price</th>
        <th style="padding:8px; border:1px solid #ddd;">Discount %</th>
        <th style="padding:8px; border:1px solid #ddd;">Nbr Colis</th>
        <th style="padding:8px; border:1px solid #ddd;">Total prijs</th>
        <th style="padding:8px; border:1px solid #ddd;">Total prijs</th>
        <th style="padding:8px; border:1px solid #ddd;">Rate</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td style="padding:8px; border:1px solid #ddd;"></td>
        <td style="padding:8px; border:1px solid #ddd;"></td>
        <td style="padding:8px; border:1px solid #ddd;"></td>
        <td style="padding:8px; border:1px solid #ddd;"></td>
        <td style="padding:8px; border:1px solid #ddd;"></td>
        <td style="padding:8px; border:1px solid #ddd;"></td>
        <td style="padding:8px; border:1px solid #ddd;"></td>
        <td style="padding:8px; border:1px solid #ddd;"></td>
        <td style="padding:8px; border:1px solid #ddd;"></td>
        <td style="padding:8px; border:1px solid #ddd;"></td>
        <td style="padding:8px; border:1px solid #ddd;"></td>
      </tr>
    </tbody>
  </table>

  <!-- Bottom Section -->
  <div style="display:flex; justify-content:space-between; margin:20px;">
    
    <!-- Sell Price -->
    <div style="flex:1; margin-right:20px;">
      <h4 style="margin:5px 0;">Sell price</h4>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
        <div style="border:1px solid #ddd; padding:8px;">Total VAT excl<br>0.00 €</div>
        <div style="border:1px solid #ddd; padding:8px;">Total VAT<br>0.00 €</div>
        <div style="border:1px solid #ddd; padding:8px;">Total VAT incl.<br>0.00 €</div>
        <div style="border:1px solid #ddd; padding:8px;">Total Discount<br>0.00</div>
        <div style="border:1px solid #ddd; padding:8px;">Total Qty<br>0</div>
        <div style="border:1px solid #ddd; padding:8px;">Total colis<br>0</div>
      </div>
    </div>

    <!-- Buying Price -->
    <div style="flex:1;">
      <h4 style="margin:5px 0;">Buying price</h4>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <div style="border:1px solid #ddd; padding:8px;">Total VAT excl<br>0</div>
        <div style="border:1px solid #ddd; padding:8px;">Margin<br>0.00 €</div>
      </div>
    </div>
  </div>

</body>
</html>
